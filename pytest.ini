[pytest]
addopts = -q --tb=short
cache_dir = .pytest_cache

# Collection exclusions - prevent scanning output/cache directories
norecursedirs =
    out
    _tmp
    .tmp_pytest*
    .pytest_tmp
    pytest-cache-files-*
    .pytest_cache
    **/.pytest_cache
    .venv
    __pycache__
    *.egg-info
    .git

# Test file patterns - minimize collection scope
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

testpaths = .
